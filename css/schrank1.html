<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schrank 1</title>

<link rel="stylesheet" href="css/style.css">

<style>

.wrapper{
max-width:900px;
margin:auto;
padding:20px;
}

.image-box{
position:relative;
}

.image-box img{
width:100%;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.25);
}

.zone{
position:absolute;
left:5%;
width:90%;
cursor:pointer;
border:3px solid transparent;
transition:.2s;
}

.zone:hover{
border:3px solid #00b7ff;
background:rgba(0,82,147,.20);
}

</style>

</head>

<body>

<header>

<div class="header-content">

<h1>Schrank 1</h1>

<p>Einzelinstrumente</p>

</div>

</header>

<div class="wrapper">

<div class="image-box">

<img src="img/schrank1.jpg">

<div class="zone" style="top:2%;height:14%;"
onclick="showShelf('Obere Ablage')"></div>

<div class="zone" style="top:18%;height:18%;"
onclick="showShelf('2. Ebene')"></div>

<div class="zone" style="top:38%;height:18%;"
onclick="showShelf('3. Ebene')"></div>

<div class="zone" style="top:58%;height:10%;"
onclick="showShelf('Schublade 1')"></div>

<div class="zone" style="top:69%;height:10%;"
onclick="showShelf('Schublade 2')"></div>

<div class="zone" style="top:80%;height:8%;"
onclick="showShelf('Schublade 3')"></div>

<div class="zone" style="top:89%;height:8%;"
onclick="showShelf('Schublade 4')"></div>

</div>

</div>

<script>

function showShelf(name){

alert("Geöffnet: "+name);

}

</script>

</body>
</html>
